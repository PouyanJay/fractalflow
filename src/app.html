<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.svg" type="image/svg+xml" />
		<link rel="apple-touch-icon" href="%sveltekit.assets%/apple-touch-icon.png" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="theme-color" content="#0b0e13" />
		<meta
			name="description"
			content="FractalFlow Studio — a GPU-native, local-first studio for crafting beautiful, colorful fractal art in the browser."
		/>
		<meta name="text-scale" content="scale" />
		<script>
			// No-flash guard: on a compact viewport the docked panels in the
			// prerendered markup would briefly cover the canvas before hydration
			// decides the layout. Mark the document so CSS hides the drawers until
			// the app mounts (which removes the attribute). Mirrors COMPACT_QUERY.
			try {
				if (window.matchMedia('(max-width: 900px)').matches)
					document.documentElement.setAttribute('data-ff-preload', '');
			} catch (e) {}
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
